          - generic [ref=e38]:
            - heading "Limited Submission" [level=1] [ref=e39]
            - generic [ref=e41]:
              - paragraph [ref=e42]: Funding agencies may occasionally place limits on the number of letters of intent, pre-proposals, proposals, or applications that any one university may submit in response to a funding opportunity announcement. To prevent any potential disqualification of submissions, the following guidelines have been established.
              - heading "Guidelines" [level=3] [ref=e43]
              - paragraph [ref=e44]:
                - strong [ref=e45]:
                  - emphasis [ref=e46]: Communicating the Information
                - text: When you plan to submit a proposal in response to a limited submissions opportunity, please inform the Office of Research Administration (ORA)
                - emphasis [ref=e47]: as soon as possible
                - text: . Email the following information to Ms. Ailing Zhang, Sr. Grants Manager, at
                - link "ailing.zhang@morgan.edu" [ref=e48] [cursor=pointer]:
                  - /url: mailto:ailing.zhang@morgan.edu
                - text: and Ms. Gillian Silver, Director of Office of Research Administration, at
                - link "gillian.silver@morgan.edu" [ref=e49] [cursor=pointer]:
                  - /url: mailto:gillian.silver@morgan.edu
                - text: ":"
              - list [ref=e50]:
                - listitem [ref=e51]: Solicitation number
                - listitem [ref=e52]: Project title
                - listitem [ref=e53]: The names of the principal investigators (internal and external) and their affiliation, and other key personnel
              - paragraph [ref=e54]:
                - strong [ref=e55]:
                  - emphasis [ref=e56]: Selection
                - text: If the number of applications is fewer than or equal to the maximum allowed, all applications will be submitted.
                - text: If the number of applications exceeds the maximum allowed, selection will depend on timing of your notice to the ORA.
              - list [ref=e57]:
                - listitem [ref=e58]: If the first request is received within 6 weeks of the submission deadline, the ORA will treat this as “first come, first served”, and the first request will be submitted.
                - listitem [ref=e59]:
                  - text: If the first request is received more than 6 weeks prior to the deadline, Dr. Farin Kamangar, Assistant Vice President for Research, will choose between the applications, or he may convene a group to review them.
                  - list [ref=e60]:
                    - listitem [ref=e61]:
                      - text: In such a case, you may be asked to submit all of the initial information (solicitation number, project title, principal investigators, key personnel), as well as a 4-page summary and the biosketches of principal investigators and key personnel.
                      - list [ref=e62]:
                        - listitem [ref=e63]: "In the 4-page summary please try to show the following to the greatest extent possible: the impact of the project, novelty of the idea, strength of the team, availability of facilities and equipment needed for the project, relevance to Morgan’s mission, and training opportunities for students and/or postdocs."
              - paragraph [ref=e64]:
                - strong [ref=e65]:
                  - emphasis [ref=e66]: Full Proposal Submission
                  - emphasis
                - text: If you are chosen to submit, you will need to follow all ORA’s grant submission procedures, including submitting and Internal Routing Form, budget and budget justification, and other required material.
              - paragraph [ref=e67]:
                - strong [ref=e68]:
                  - emphasis [ref=e69]: Resubmission
                  - emphasis
                - text: If a proposal is submitted for a limited submission opportunity and is not funded, that proposal will have no preference over other projects in any subsequent limited submission opportunities.
              - paragraph [ref=e70]:
                - strong [ref=e71]:
                  - emphasis [ref=e72]: Failure to Submit Full Proposal(s)
                  - emphasis
                - text: If you are authorized to submit, but fail to do so, you may not be considered for submission the subsequent year, especially if the number of applications exceeds the maximum allowed. However, this penalty will be at the discretion of the Assistant Vice President for Research.
