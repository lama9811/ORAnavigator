            - heading "Notification and Setup of Award" [level=1] [ref=e39]
            - generic [ref=e41]:
              - heading "Notification of Award" [level=3] [ref=e42]
              - paragraph [ref=e43]: Notification of a sponsored program award to the University may be an award letter, a purchase order, a detailed contract, or an agreement spelling out the terms and conditions of the award. The award is made to the University, not an individual. Generally, the notification of award goes to the Assistant VP for Research Administration who will send copies to the PI/PD and the VP for Finance and Management. In addition, the Office of Restricted Funds Accounting (RFA) will be notified.
              - paragraph [ref=e44]: "Note: Awards for proposals that did not undergo the normal internal processing, review, and approval through the Office of Research Administration (ORA) may be refused by the University. In all cases, the University is not obligated to accept an award."
            - generic [ref=e46]:
              - heading "Set-Up of Award" [level=3] [ref=e47]
              - paragraph [ref=e48]: After an award has been formally accepted by the University, the relevant documents are sent to RFA, which then assigns an Index or Budget code number for the award and sets up the account in the University's financial reporting system (Banner). The Comptroller's Office is notified as well. This process typically takes up to three days. ORA is notified once the Index/Budget code number is assigned.
              - paragraph [ref=e49]:
                - text: In the meantime, a Post-Award Briefing meeting (see next section) is scheduled with the Principal Investigator (PI) and other University supporting units to review the terms and conditions of the award as well discuss institutional processes, compliance requirements, and financial administration of the project.
                - link:
                  - /url: mailto:edet.isuk@morgan.edu
            - generic [ref=e51]:
              - heading "Post Award Briefing" [level=3] [ref=e52]
              - paragraph [ref=e53]: The purpose of the post-award briefing is to provide PIs/PDs with a roadmap in administering and managing key grant/contract post-award activities.
              - paragraph [ref=e54]: These activities span the post-award process from setting up the award account in Banner Accounting System to preparing final reports at the close of the award, and they involve interactions with several divisional offices or units.
              - paragraph [ref=e55]: "In particular, the primary offices include:"
              - list [ref=e56]:
                - listitem [ref=e57]: Office of Research Administration
                - listitem [ref=e58]: Office of Human Resources
                - listitem [ref=e59]: Office of Procurement
                - listitem [ref=e60]: Office of the Comptroller
                - listitem [ref=e61]: Purchasing Card Office
              - paragraph [ref=e62]: "For questions regarding the Post-Award Briefing, contact:"
              - paragraph [ref=e63]:
                - text: Dr. Edet Isuk
                - text: Director of Research Compliance
                - link "edet.isuk@morgan.edu" [ref=e64] [cursor=pointer]:
                  - /url: mailto:edet.isuk@morgan.edu
