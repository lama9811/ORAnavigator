            - heading "Changes to an Award" [level=1] [ref=e39]
            - generic [ref=e41]:
              - paragraph [ref=e42]:
                - text: Prior to planning for any changes in a received award, review the award document and sponsor policies to determine whether the proposed change requires sponsor approval or may be solely approved internally by Morgan State University officials. For any questions, email
                - link "ask.ora@morgan.edu" [ref=e43] [cursor=pointer]:
                  - /url: mailto:ask.ora@morgan.edu
                - text: .
              - heading "Change of PI or Key Personnel" [level=3] [ref=e44]
              - paragraph [ref=e45]:
                - text: Circumstances may occasionally arise which necessitate the selection of a new Principal Investigator (PI) or Co-PI/PD for an active sponsored project. The new appointment can only be made with the concurrence of the departmental head, the dean of the school or college, and ultimately, the sponsor. The request for a change should provide an explanation of why the change is necessary and also include the CV of the new PI and/or Co-PIs/PDs, and should be channeled through the Associate Vice President for ORA
                - link "Dr. Farin Kamangar" [ref=e46] [cursor=pointer]:
                  - /url: /office-of-research-administration/about/staff-directory/farin-kamangar
                - text: to the sponsor.
              - heading "No Cost Extension" [level=3] [ref=e47]
              - paragraph [ref=e48]: If a PI determines that more time will be needed to complete work on a sponsored project beyond the expiration date of the award, a no-cost extension may be requested from the sponsor. The PI should notify ORA in writing about the need for a no-cost extension at least sixty (60) days prior to the expiration date of the award. ORA will work with the PI to obtain the sponsor’s approval.
              - heading "Transfer of Award" [level=3] [ref=e49]
              - paragraph [ref=e50]:
                - strong [ref=e51]: Transfer of Award FROM Another Institution
                - text: A new faculty member may wish to transfer an award from a previous institution to Morgan State University. Such a transfer must have the approval of both the sponsor and the previous institution. If approval is granted, the PI should prepare a new or revised proposal for internal processing and submit it to ORA for further processing.
              - paragraph [ref=e52]:
                - strong [ref=e53]: Transfer of Award TO Another Institution
                - text: Occasionally, a PI may accept an appointment at another institution before the expiration of an award received while employed by Morgan State University. If MSU elects to retain the project, a new PI will be appointed to take over the project, following the process described in the preceding section. The departing PI may be retained in the project using a subaward or a consultant agreement. Should MSU elect not to retain the project, the departing PI must send a request to transfer the unspent portion of the award to the new institution. Such a transfer must be approved by the department head, the dean of the school or college, and ultimately by the sponsoring agency. Approved transfers occur only after final accounting and certification by the responsible grant accountant that all incurred obligations have been settled, and a balance remains for transfer to the new institution.
