            - generic [ref=e41]:
              - heading "Subaward" [level=3] [ref=e42]
              - paragraph [ref=e43]: A subaward is issued to a subrecipient for assistance in carrying out a specified programmatic effort on a sponsored project. Morgan State University passes-through a portion of the sponsored award to the other entity. Subawards are called subgrants, subagreements, or subcontracts. All of the terms and conditions that are part of the prime award are applicable to the type of subrecipient entity involved and must be included in the subaward document. The term subaward also includes awards made by a subrecipient to a lower tier subrecipient with prior approval.
              - paragraph
              - heading "Subrecipient" [level=3] [ref=e44]
              - paragraph [ref=e45]: A subrecipient is a legal entity to which a subaward is made and which is accountable for the use of the funds provided in carrying out a portion of Morgan State University’s programmatic effort under a sponsored project. A subrecipient has responsibility for programmatic and/or administrative decision-making and adherence to the applicable sponsored program compliance requirements.
