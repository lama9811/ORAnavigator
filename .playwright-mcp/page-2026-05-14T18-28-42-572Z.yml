          - generic [ref=e38]:
            - heading "Reporting" [level=1] [ref=e39]
            - generic [ref=e41]:
              - heading "Reporting Overview" [level=3] [ref=e42]
              - paragraph [ref=e43]: After an award is issued, funding agencies monitor programmatic and financial aspects of a project. The PI/PD is responsible for preparing the programmatic/technical reports that are submitted to the funding agency at regular intervals. Such reports may be submitted monthly, quarterly, annually, or at the closing of the grant, based on the terms and conditions of the Notice of Award (NoA). These reports are sometimes submitted directly by the PI, but are often required to be submitted via the Office of Research Administration (ORA).
              - paragraph [ref=e44]: Fiscal reports also need to be submitted at regular intervals, as instructed in the NoA. Fiscal reports are submitted by the Office of Restricted Funds Accounting (RFA). However, the PI needs to communicate with RFA to be sure that the expenses are correct.
              - paragraph [ref=e45]: All aspects of grant management, programmatic or fiscal, are governed by the Office of Management and Budget (OMB) guidelines, including CFR 200. The NoAs and terms and conditions typically reflect those guidelines, with some further added restrictions specific to that award.
              - paragraph [ref=e46]: "Common reports include:"
              - list [ref=e47]:
                - listitem [ref=e48]: Programmatic (annual progress reports, final technical reports, invention reports)
                - listitem [ref=e49]: Financial (annual financial reports, final financial reports, and invoicing)
              - paragraph [ref=e50]: Another important post-award report is Effort Certification Reporting, in which the percentage of effort spent on this award for each individual personnel is recorded.
              - paragraph [ref=e51]: For more information, see below.
            - generic [ref=e54]:
              - generic [ref=e55]:
                - link "Programmatic Reporting " [ref=e187] [cursor=pointer]:
                  - /url: "#"
                  - generic [ref=e57]: Programmatic Reporting
                  - generic [ref=e58]:
                    - text: +
                    - generic [ref=e189]: 
                - generic [ref=e190]:
                  - paragraph [ref=e191]: In most cases, sponsors require both progress reports and final reports. Final reports are normally due within 90 days after the end of the project period, and usually include the technical, property (major equipment), and invention reports. The Property and Invention reports must be completed even when the project acquired no equipment nor produced an invention. PIs should take this requirement seriously and ensure that all reports are submitted to the sponsor on or before the due date. Failure to do so may adversely affect future prospects for funding from the agency. The schedule for required technical reports is often incorporated in the award document from the sponsor.
                  - paragraph [ref=e192]: "Examples of reports include:"
                  - list [ref=e193]:
                    - listitem [ref=e194]: Interim Reports/Progress reports
                    - listitem [ref=e195]: Final Technical Reporting
                    - listitem [ref=e196]: Invention Reporting
                    - listitem [ref=e197]: Final Reports/Closeout
              - generic [ref=e61]:
                - link "Effort Reporting and Certification " [ref=e198] [cursor=pointer]:
                  - /url: "#"
                  - generic [ref=e63]: Effort Reporting and Certification
                  - generic [ref=e64]:
                    - text: +
                    - generic [ref=e200]: 
                - generic [ref=e201]:
                  - paragraph [ref=e202]:
                    - strong [ref=e203]: General Overview
                    - text: As a recipient of federal funding Morgan State University (MSU) is required to comply with the Office of Management and Budget Circular Uniform Administrative Requirements, Cost Principles, and Audit Requirements for Federal Awards "Uniform Guidance", as well as other federal requirements for certifying effort expended on sponsored awards. MSU requires all individuals who receive federal sponsored funding to comply with sponsoring agency regulations regarding the proposing, charging, and reporting of effort on those awards. MSU faculty and staff should ensure time charged to sponsored awards is commensurate with the committed effort expended on all activities they perform.
                  - paragraph [ref=e204]:
                    - strong [ref=e205]: Effort Reporting Procedure at MSU
                    - text: Time and Effort Certification Reports are generated three times a year (February for the Fall semester, July for Spring Semester, and October for Summer effort) for all employees paid from federal and state contracts or grants, including any mandatory cost sharing accounts. The reports are sent to the PIs, PDs and employees paid from and responsible for the funds reflected on the reports. The Platform used to distribute the reports is Searchlight. PIs, PDs, employees, and alternate certifiers are notified of the availability of time and effort reports via email from the Searchlight platform. The PIs or PDs or their approved designee (alternate certifiers) must verify and certify the reports, certifying that the employees reflected on the reports actually performed the work on the indicated accounts and in the same percentage of time. Any corrections to effort should be reported immediately to the Director of the Office of Research Administration,
                    - link "Gillian.Silver@morgan.edu" [ref=e206] [cursor=pointer]:
                      - /url: mailto:gillian.silver@morgan.edu
                    - text: "- and the Grant Accountant assigned to the grant in Restricted Funds Accounting (RFA). Once released to the campus, the certifications should be completed within 14 calendar days."
                  - paragraph [ref=e207]:
                    - strong [ref=e208]: What is time and effort reporting?
                    - text: Effort is defined as the amount of time spent on a particular activity. It includes the time spent working on a sponsored project in which salary is directly charged or cost-shared effort (also known as match). Individual effort is expressed as a percentage of the total amount of time spent on work-related activities for which the University compensates an individual. Effort reporting is the Federally mandated method of certifying to the granting agencies that the effort charged or cost shared to each award has actually been completed.
                  - paragraph [ref=e209]:
                    - strong [ref=e210]: What is a sponsored project?
                    - text: A sponsored project is a funded project covering a range of activities including research, teaching, training, and services. The project may be supported by a number of different sponsors, such as federal agencies, state agencies, private foundations, corporate or industry, or non-profit organizations. These sponsors formalize the transfer of money to MSU with the intent to either carry out a public purpose or provide direct benefit to the sponsoring agency. At MSU, most of the sponsors that require time and effort certifications are federal agencies, state agencies, and federally sponsored contracts.
                  - paragraph [ref=e211]:
                    - strong [ref=e212]: Why is it necessary?
                    - text: The federal government mandate requires an effort report when an individual is compensated by or has agreed to contribute time to a federally sponsored project. All MSU faculty and staff serving as principal investigators (PIs) or project directors (PDs) on sponsored agreements are personally responsible to certify the amount of effort that they and their employees spent on sponsored activities.
                  - paragraph [ref=e213]:
                    - strong [ref=e214]: Who certifies Effort Reports?
                    - text: All PIs/PDs, faculty, professional staff, and students paid directly from federal grants and contracts (including federal flow-through sub-contracts) are required to certify their effort electronically at the end of the Fall semester, Spring semester, and Summer.
                  - paragraph [ref=e215]:
                    - strong [ref=e216]: Effort Certifying Process
                    - text: The automated effort reporting system provides a percentage of distribution between sponsored and non-sponsored programs for the hours worked. The electronic report may be certified by either the employee, Supervisor, or PIs/PDs who has personal familiarity with the employee’s compensated effort. Since this is an after-the-fact report, the electronic effort report is generated based on historical payroll data for a specific reporting period.
                  - paragraph [ref=e217]:
                    - strong [ref=e218]: What is contributed or cost-shared effort?
                    - text: Cost sharing represents that portion of the total project costs of a sponsored agreement that are not charged to the sponsor. These costs are absorbed by the University rather than by the sponsor. Since faculty, administrative, and clerical salaries at MSU are paid for by the employee's department, cost sharing of effort represents a redirection of departmental resources from teaching or other departmental activities to support sponsored agreements.
                  - paragraph [ref=e219]: Cost sharing can be required by the sponsor or volunteered by a principal investigator or project director; regardless, any commitment of effort referenced in the project proposal or the award document must be honored, reported, and captured in an effort reporting system.
                  - paragraph [ref=e220]: "For questions related to Effort Reporting, Email:"
                  - paragraph [ref=e221]:
                    - text: Ms. Gillian Silver
                    - text: Director, Office of Research Administration
                    - link "Gillian.Silver@morgan.edu" [ref=e222] [cursor=pointer]:
                      - /url: mailto:Gillian.Silver@morgan.edu
                  - paragraph [ref=e223]: or
                  - paragraph [ref=e224]:
                    - text: Mr. Ryan Mobley
                    - text: Training and Communications Coordinator, Office of Research Administration
                    - link "Ryan.Mobley@morgan.edu" [ref=e225] [cursor=pointer]:
                      - /url: mailto:Ryan.Mobley@morgan.edu
