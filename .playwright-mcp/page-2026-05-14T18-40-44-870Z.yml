              - paragraph [ref=e42]: Morgan State University promotes adherence to federal regulations and best practices in academia to uphold the highest standards of research ethics and public trust in its scholarly activities. To this end, the universityŌĆÖs conflict of interest requirements ensure integrity and transparency in its research and commercialization activities. These policies and procedures are designed to identify and manage any potential conflicts that may arise when personal, financial, or other interests could compromise, or appear to compromise, the objectivity of research and the ethical conduct of researchers. Faculty, staff, and students involved in research must disclose any significant financial interests or external commitments that could influence their research outcomes.
