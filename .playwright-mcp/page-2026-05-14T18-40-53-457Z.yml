                - generic [ref=e64]:
                  - link "Human Subjects Research" [ref=e66] [cursor=pointer]:
                    - /url: /office-of-research-administration/research-compliance/human-subjects-research
                  - paragraph [ref=e68]: In order to pursue research involving Human Participants, Morgan State University researchers are required to abide by all Federal, State, and award regulations. The Human Subjects Research webpage under the Office of Research Administration hosts all relevant details, forms, contacts regarding Human Subjects Research at Morgan State University.
              - listitem [ref=e69]:
                - generic [ref=e70]:
                  - link "Animal Research" [ref=e72] [cursor=pointer]:
                    - /url: /office-of-research-administration/research-compliance/animal-research
                  - paragraph [ref=e74]: The Animal Research Facility allows researchers to utilize laboratory animals in an innovative, ethical, and humane manner for advancing scientific knowledge.
              - listitem [ref=e75]:
                - generic [ref=e76]:
                  - link "Conflict of Interest" [ref=e78] [cursor=pointer]:
                    - /url: /office-of-research-administration/research-compliance/conflict-of-interest-x12058
                  - paragraph [ref=e80]: Morgan State University abides by all state and federal conflict of interest policies and procedures.
              - listitem [ref=e81]:
                - generic [ref=e82]:
                  - link "Responsible Conduct of Research (RCR)" [ref=e84] [cursor=pointer]:
                    - /url: /office-of-research-administration/research-compliance/responsible-conduct-of-research
                  - paragraph [ref=e86]: Morgan State University recognizes that scientific research is expected to benefit the public at large and must be guided by the core values of honesty, accuracy, objectivity and trust.
              - listitem [ref=e87]:
                - generic [ref=e88]:
                  - link "Research Misconduct" [ref=e90] [cursor=pointer]:
                    - /url: /office-of-research-administration/research-compliance/research-misconduct
                  - paragraph [ref=e92]: Research Misconduct is defined as fabrication, falsification, or plagiarism in proposing, performing, or reviewing research, or in reporting research results according to 42 CFR Part 93 .
              - listitem [ref=e93]:
                - generic [ref=e94]:
                  - link "Research Security" [ref=e96] [cursor=pointer]:
                    - /url: /office-of-research-administration/research-compliance/research-security
                  - paragraph [ref=e98]: At Morgan State University, we are dedicated to fostering a secure and ethical research environment, particularly for our federally sponsored research endeavors. As global research collaborations grow and technological advancements accelerate, it is essential to address emerging security risks that could compromise the integrity, confidentiality, and success of our work. Our Research Security Program is designed to protect the integrity of research and uphold federal regulations, ensuring that all research is conducted with the highest standards of security, compliance, and accountability.
              - listitem [ref=e99]:
                - generic [ref=e100]:
                  - link "State of Maryland Ethics and Financial Disclosure" [ref=e102] [cursor=pointer]:
                    - /url: /office-of-research-administration/research-compliance/state-of-maryland-ethics-and-financial-disclosure
                  - paragraph [ref=e104]: Morgan State University is an entity of the State of Maryland, and as such, is compelled to abide by State Ethics and Financial Regulations
