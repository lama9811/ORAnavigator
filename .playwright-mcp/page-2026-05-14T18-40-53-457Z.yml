            - generic [ref=e40]:
              - paragraph [ref=e41]: "Research Compliance provides oversight and serves as a resource for policy development, regulatory analysis and interpretation, training, and education to raise awareness of procedures and guidelines designed to support the responsible and ethical conduct of research at the University. The mission is to ensure that Morgan faculty, students and staff are in compliance with the complex web of regulatory requirements that govern research. Major areas include: human subjects, responsible conduct of research (RCR), research misconduct, export control, animal subjects, and financial conflicts of interest (FCOI)."
