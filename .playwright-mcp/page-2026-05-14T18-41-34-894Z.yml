          - generic [ref=e39]:
            - heading "Conflict of Interest for Sponsored Research" [level=1] [ref=e40]
            - generic [ref=e42]:
              - heading "Financial Conflict of Interest (FCOI)" [level=3] [ref=e43]
              - paragraph [ref=e44]: Financial conflicts of interest in sponsored research occur when the financial interests of Investigators (or those of the Investigator’s spouse/domestic partner and/or dependent children) could directly and significantly affect the design, conduct or reporting of research, or present the appearance of doing so. Many aspects of research – from how a study is designed, how data is collected, analyzed and reported, to what individuals/suppliers are involved in the work, can be potentially influenced inappropriately by conflicts of interest
              - paragraph [ref=e45]: Ideally, financial interests should not, and in most instances do not, compromise intellectual honesty. Nevertheless, they certainly can, especially if the financial interests are significant. Concerns about the actual or potential adverse effect of financial interests on research provided the impetus for the Public Health Service (PHS) and the National Science Foundation (NSF) to adopt conflict of interest policies (e.g., 42 CFR Part 50 subpart F)
              - paragraph [ref=e46]: These Federal regulations and guidance regarding financial conflicts of interest in research are all designed to promote objectivity in research. They require that the design, conduct, and reporting of research funded under federal grants, cooperative agreements, or contracts will be free from bias resulting from conflicts.
              - paragraph [ref=e47]: "In compliance with these regulations, the Office of Research Compliance (ORC) seeks to promote objectivity in research at MSU by identifying real or potential financial of interest and advising faculty researchers on how to mitigate, manage, and if necessary eliminate those conflicts. To that end, ORC has established administrative procedures for:"
              - list [ref=e48]:
                - listitem [level=1] [ref=e49]: disclosing significant conflicts before any research is undertaken;
                - listitem [level=1] [ref=e50]: managing, reducing, or eliminating significant financial conflicts of interest; and
                - listitem [level=1] [ref=e51]: providing subsequent reports on how the conflicts were handled.
              - paragraph [ref=e52]:
                - text: All investigators who are responsible for designing, conducting, or reporting on research or research activities must also complete training on financial conflicts of interest. The training is currently available through the
                - link "CITI Training Program" [ref=e53] [cursor=pointer]:
                  - /url: https://about.citiprogram.org/
                - generic [ref=e54]:
                  - link "," [ref=e55] [cursor=pointer]:
                    - /url: https://about.citiprogram.org/
                  - text: and is required every 4 years.
