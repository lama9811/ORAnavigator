          - generic [ref=e39]:
            - heading "Training and Consultation Services" [level=1] [ref=e40]
            - generic [ref=e42]:
              - paragraph [ref=e43]: "The Facility Director, Manager or Veterinarian have over fifteen years of combined experience working with laboratory animals in research, teaching, and facility operations with certification in various animal care and use operations. Training or consultation services provided are as follows:"
              - list [ref=e44]:
                - listitem [ref=e45]: Health and safety training workshops semi-annually and by appointment
                - listitem [ref=e46]: Basic rodent handling, animal care and health monitoring training by appointment
                - listitem [ref=e47]: Consultations for laboratory animal research design and IACUC protocol writing by appointment.
                - listitem [ref=e48]: Individualized training for specialized surgical and behavioral techniques or other technical procedures are available by appointment.
              - paragraph [ref=e49]:
                - generic [ref=e50]:
                  - text: To schedule training and consultation
                  - link "MSU's Microsoft booking link" [ref=e51] [cursor=pointer]:
                    - /url: https://my.ilabsolutions.com/service_center/show_external/6195/research_infrastructure_core
                  - text: . Log on using your MSU credentials.
              - heading "2024-2025 schedule" [level=2] [ref=e52]: 2024-2025 schedule
              - paragraph [ref=e53]: IACUC meets 1-3 the second thursday of each month.
              - paragraph [ref=e54]: Protocols must be submitted by the third thursday of the prior month to be reviewed,
              - paragraph [ref=e55]: "How to register for an iLab account:"
              - paragraph [ref=e56]: "To get started, you must register for an account:"
              - list [ref=e57]:
                - listitem [ref=e58]:
                  - text: "Navigate to the core page:"
                  - link "https://my.ilabsolutions.com/service_center/show_external/6195/research_infrastructure_core" [ref=e59] [cursor=pointer]:
                    - /url: https://my.ilabsolutions.com/service_center/show_external/6195/research_infrastructure_core
                - listitem [ref=e60]: In the upper-right-hand corner of the screen select the ‘Register’ option
                - listitem [ref=e61]: You will be directed to a series of questions; this information will be used to submit an account request.
                - listitem [ref=e62]: Once your registration is complete and submitted, it may take up to 24 hours for your account to be created.
                - listitem [ref=e63]: Once your registration has been submitted, your PI will receive a notification that you have requested membership to their lab in iLab. They will need to approve your membership and assign any Accounts for your use.
              - paragraph [ref=e64]: "To Create an Equipment Reservation:"
              - paragraph [ref=e65]: Once you have been accepted into your PI’s lab and assigned Index, you can schedule equipment time.
              - list [ref=e66]:
                - listitem [ref=e67]:
                  - text: "Navigate to the core page:"
                  - link "https://my.ilabsolutions.com/service_center/show_external/6195/research_infrastructure_core" [ref=e68] [cursor=pointer]:
                    - /url: https://my.ilabsolutions.com/service_center/show_external/6195/research_infrastructure_core
                - listitem [ref=e69]: At the upper right hand of the page click ‘Sign In’ and then select the ‘Sign In’ option.
                - listitem [ref=e70]: Enter your iLab username and password, and sign in.
                - listitem [ref=e71]: Select the Schedule Equipment tab and click on the ‘View Schedule’ button next to the instrument of interest. Click and drag on the time period you would like to schedule your reservation for.
                - listitem [ref=e72]: A window will pop up that will allow you to verify your reservations details and provide payment information before saving the reservation.
              - paragraph [ref=e73]: "To Create a Service Request:"
              - paragraph [ref=e74]: Once you have been accepted into your PI’s lab and assigned Index, you can create service requests.
