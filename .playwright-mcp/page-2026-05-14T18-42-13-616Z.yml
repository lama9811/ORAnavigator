            - generic [ref=e41]:
              - paragraph [ref=e42]: Morgan State University requires all research involving human subjects to be reviewed and approved by the Institutional Review Board (IRB) in compliance with federal regulations (45 CFR 46). The Office of Research Compliance (ORC) oversees this process, and proposals must include research protocols and consent forms. Researchers should allow at least 30 days for review, after which the IRB will notify them in writing of the outcome - approval, disapproval, or conditional approval. All processes, procedures, instructions, required training, and documentation are below.
