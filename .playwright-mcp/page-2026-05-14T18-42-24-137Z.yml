              - paragraph [ref=e43]: The Animal Research Facility located in Martin D. Jenkins Behavioral and Social Sciences Center is a state-of-the-art facility that supports Morgan State University scholars in their conduct of groundbreaking research. The facility allows researchers to utilize laboratory animals in an innovative, ethical, and humane manner for advancing scientific knowledge.
