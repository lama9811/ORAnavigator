              - separator [ref=e88]
              - heading "General Description" [level=3] [ref=e89]: General Description
              - paragraph [ref=e90]:
                - text: The Animal Research Facility (ARF) was built in 2017 and includes a state-of-the-art vivarium and research facility. This research facility was built, staffed and equipped according to the standards of the American Association for Accreditation of Laboratory Animal Care (AAALAC). Faculty and students can perform laboratory animal studies in an innovative, ethical, and humane manner. Housing is available for rats and mice, with an aquarium space for small aquatic species.
                - generic [ref=e91]:
                  - strong [ref=e92]:
                    - emphasis [ref=e93]: "Square Footage:"
                  - text: "2725"
              - paragraph [ref=e94]:
                - generic [ref=e95]:
                  - text: The Facility Manager, Caretaker and Veterinarian are American Association for Laboratory Animal Science (AALAS) certified. All work performed in the facility is approved by the Morgan State University
                  - link "Institutional Animal Care and Use Committee" [ref=e96] [cursor=pointer]:
                    - /url: https://www.morgan.edu/office-of-research-administration/research-compliance/animal-research
                  - text: and adheres to occupational
                  - link "Health and Safety" [ref=e97] [cursor=pointer]:
                    - /url: https://www.morgan.edu/oshe
                  - text: guidelines. Any interested investigator is encouraged to email the Director,
                  - link "Dr. Ingrid Tulloch" [ref=e98] [cursor=pointer]:
                    - /url: mailto:ingrid.tulloch@morgan.edu
                  - text: ", for training resources.."
              - paragraph [ref=e99]: The ARF maintains compliance at all times with federal Animal Welfare Act requirements for laboratory animal care and use.
