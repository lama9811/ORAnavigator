        - generic [ref=e38]:
          - heading "Research Security" [level=1] [ref=e39]
          - generic [ref=e41]:
            - heading "Welcome to the Research Security Program at Morgan State University" [level=4] [ref=e42]:
              - strong [ref=e43]: Welcome to the Research Security Program at Morgan State University
            - paragraph [ref=e44]: At Morgan State University, we are dedicated to fostering a secure and ethical research environment, particularly for our federally sponsored research endeavors. As global research collaborations grow and technological advancements accelerate, it is essential to address emerging security risks that could compromise the integrity, confidentiality, and success of our work. Our Research Security Program is designed to protect the integrity of research and uphold federal regulations, ensuring that all research is conducted with the highest standards of security, compliance, and accountability.
            - paragraph [ref=e45]: "Our program focuses on four critical areas that are essential for safeguarding federally funded research:"
            - list [ref=e46]:
              - listitem [ref=e47]:
                - strong [ref=e48]: "Cybersecurity:"
                - text: With the increasing reliance on digital platforms for research, protecting sensitive data, systems, and networks from cyber threats is a top priority. Our program offers guidance and resources to help researchers safeguard their data, prevent breaches, and ensure that their digital environments are secure from evolving cyber risks.
              - listitem [ref=e49]:
                - strong [ref=e50]: "Export Controls:"
                - text: Compliance with U.S. export control laws is a key component of federal research funding. These regulations govern the sharing of sensitive technologies, data, and research results with international partners. Our program helps researchers navigate these complex laws to ensure that all research involving export-controlled information adheres to federal guidelines, preventing unauthorized access to sensitive technologies.
              - listitem [ref=e51]:
                - strong [ref=e52]: "Conflict of Interest:"
                - text: Maintaining transparency and avoiding conflicts of interest is critical in research, particularly when federal funding is involved. We provide researchers with clear policies and procedures to identify, disclose, and manage potential conflicts of interest, ensuring that all research activities are conducted with the highest ethical standards.
              - listitem [ref=e53]:
                - strong [ref=e54]: "Foreign Travel Security:"
                - text: International collaborations often involve travel to foreign countries, which can present unique risks to federally sponsored research. Our program equips researchers with strategies to protect themselves and their work when traveling abroad, including guidelines for handling sensitive data and intellectual property in international settings.
            - paragraph [ref=e55]: The Research Security Program at Morgan State University integrates these crucial areas into a cohesive framework that supports and guides researchers through the complexities of securing federally sponsored research. By fostering a culture of security awareness and providing practical resources, we empower our researchers to pursue groundbreaking work while maintaining compliance with federal regulations and protecting the integrity of their research.
            - paragraph [ref=e56]: Together, we ensure that Morgan State University's research remains secure, innovative, and aligned with the highest standards of federal research compliance.
