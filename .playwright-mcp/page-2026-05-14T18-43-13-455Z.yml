            - heading "Technology Control Plan (TCP)" [level=1] [ref=e40]
            - generic [ref=e42]:
              - paragraph [ref=e43]: As part of our ongoing commitment to maintaining a secure and reliable digital environment, Morgan State University has implemented a Technology Control Plan (TCP). This will be used to safeguard our IT infrastructure, sensitive data, and academic resources. The TCP serves as a comprehensive framework that outlines essential policies and practices for managing technology across the campus.
              - paragraph [ref=e44]: For faculty members, the plan establishes clear guidelines on secure access, data protection, and appropriate use of university-owned technology resources. It ensures that all systems and applications are maintained with robust security protocols to protect both academic and administrative information. The TCP also addresses compliance with legal requirements, ensuring that we meet federal and state standards in handling sensitive data.
