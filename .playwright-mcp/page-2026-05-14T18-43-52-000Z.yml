          - generic [ref=e39]:
            - heading "NSPM-33 Overview" [level=1] [ref=e40]
            - paragraph [ref=e43]: National Security Presidential Memorandum-33 (NSPM-33) requires federal research agencies to ensure that institutions receiving over $50 million annually certify they have a research security program. This includes training relevant personnel on research security threats and insider threats, where applicable. In response, the NSF, NIH, DOE, and DOD have developed online research security training. The training, which is available through CITI Programs, provides guidance on global research risks and protection strategies.
