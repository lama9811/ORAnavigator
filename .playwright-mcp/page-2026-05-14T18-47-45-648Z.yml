            - heading "Responsible Conduct of Research (RCR)" [level=1] [ref=e39]
            - generic [ref=e41]:
              - paragraph [ref=e42]: Morgan State University recognizes that scientific research is expected to benefit the public at large and must be guided by the core values of honesty, accuracy, objectivity, and trust. To carry out its research mission, the University is committed to comply with the federal requirements of Responsible Conduct of Research (RCR). RCR highlights many of the issues that scientists can face in the conduct of research and the best ways to handle them. RCR addresses eight (8) major topics from falsification and fabrication, to conflicts of interest, authorship and intellectual property.
              - paragraph [ref=e43]: "All researchers who receive support from a National Institutes of Health (NIH) and/or National Science Foundation (NSF) grant are required to complete an RCR training at the start of their award and again every four years. The Office of Research Administration (ORA) supports the institutional effort at compliance by providing opportunities for RCR training through:"
              - list [ref=e44]:
                - listitem [ref=e45]:
                  - text: On-line, web-based RCR course sponsored by CITI --
                  - link "www.citiprogram.org" [ref=e46] [cursor=pointer]:
                    - /url: https://www.citiprogram.org
                  - text: Instructions for registering for the CITI Program website can be found
                  - link "here" [ref=e47] [cursor=pointer]:
                    - /url: Documents/ADMINISTRATION/OFFICES/ora/IRB%20Forms/2023-01-06_IRB_CITIProgram_Instructions.pdf
                  - text: .
