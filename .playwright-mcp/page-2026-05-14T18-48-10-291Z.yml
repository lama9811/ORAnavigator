                - generic [ref=e44]:
                  - strong [ref=e45]: Research Misconduct
                  - text: is defined as fabrication, falsification, or plagiarism in proposing, performing, or reviewing research, or in reporting research results according to 42 CFR Part 93 .
              - list [ref=e46]:
                - listitem [ref=e47]:
                  - generic [ref=e48]:
                    - strong [ref=e49]: "Fabrication:"
                    - text: making up data or results and recording or reporting them.
                - listitem [ref=e50]:
                  - generic [ref=e51]:
                    - strong [ref=e52]: "Falsification:"
                    - text: manipulating research materials, equipment, or processes, or changing or omitting data or results such that the research is not accurately represented in the research record.
                - listitem [ref=e53]:
                  - generic [ref=e54]:
                    - strong [ref=e55]: "Plagiarism:"
                    - text: the appropriation of another person's ideas, processes, results, or words without giving appropriate credit.
              - paragraph [ref=e56]:
                - generic [ref=e57]:
                  - strong [ref=e58]: Deliberate or repeated non-compliance
                  - text: with the regulations can be considered misconduct.
              - paragraph [ref=e59]:
