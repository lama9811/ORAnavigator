            - generic [ref=e41]:
              - paragraph [ref=e42]:
                - link "State of Maryland Public Ethics Law" [ref=e43] [cursor=pointer]:
                  - /url: https://ethics.maryland.gov/public-ethics-law/
                - text: Established in 1979, the State Ethics Commission replaced the Maryland Public Disclosure Advisory Board and the State Board of Ethics. The Maryland Public Ethics Law is found in the General Provisions Article, Title 5.
              - paragraph [ref=e44]:
                - generic [ref=e45]:
                  - 'link "State of Maryland Public Ethics Law: State Employees and Officials" [ref=e46] [cursor=pointer]':
                    - /url: https://ethics.maryland.gov/employeeoffcials/
                  - text: The Conflict of Interest provisions of the
                  - link "Public Ethics Law" [ref=e47] [cursor=pointer]:
                    - /url: https://ethics.maryland.gov/wp-content/uploads/filebase/general/Public-Ethics-Law.pdf
                  - text: ", Maryland Code Annotated, General Provisions, Title 5, Subtitle 5,"
                  - strong [ref=e48]: apply to ALL State Employees
                  - text: ", regardless of grade or years of service."
              - paragraph [ref=e49]:
                - generic [ref=e50]:
                  - 'link "State of Maryland Public Ethics Commission: Financial Disclosure" [ref=e51] [cursor=pointer]':
                    - /url: https://ethics.maryland.gov/employeeoffcials/financial-disclosure/
                  - text: The State Ethics Commission administers a financial disclosure program that requires more than 14,000 State employees, elected officials, candidates for State elected offices, other categories of officials including State agency managers, regulators and purchasing staff, and some appointed members of boards and commissions to file annual financial disclosure statements. The financial disclosure forms require the filer to identify real estate interests, equity interests, and other relationships such as employment, debts and gifts so that the public can be assured that the impartiality and independent judgment of those officials and employees will be maintained.
              - paragraph [ref=e52]:
                - generic [ref=e53]:
                  - link "State of Maryland Public Ethics Law Training" [ref=e54] [cursor=pointer]:
                    - /url: https://ethics.maryland.gov/employeeoffcials/mandatory-training/
                  - text: The Public Ethics Law requires new financial disclosure filers to receive two hours of Ethics training within six months of being required to file. The training covers all areas of the Public Ethics Law but focuses mainly on conflicts of interest and standards of conduct.
