              - heading "Diversity & EEO" [level=3] [ref=e42]
              - paragraph [ref=e43]: Morgan State University aims to maintain an academic and working environment in which students, faculty, and staff feel safe and are free to develop intellectually, professionally, personally, and socially. Acts of discrimination and lack of inclusivity subvert the University’s mission to grow globally, threaten the wellbeing of the University community, and interfere with academic and employment growth. The University has in place intentional steps to attract a more diverse community and to develop a sense of belonging. The University has a multi-faceted approach for fair and improved inclusion of underserved students, staff, and faculty. All policies that facilitate Diversity, Equity, and Inclusion plus a statement on how Morgan State University upholds these policies and the extent to which these policies are incorporated into the University’s programming are available below.
