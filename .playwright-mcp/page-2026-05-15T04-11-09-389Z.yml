            - paragraph [ref=e41]: The Office of Research Administration (ORA), formerly known as the Office of Sponsored Programs and Research, has the primary administrative responsibility to provide needed services and support in the University's efforts to obtain external funding. We serve as the central coordinating unit for the University's externally sponsored research activities and projects. The Office of Research Administration also processes, monitors, and facilitates the evaluation of all sponsored research projects to ensure that all grants and contracts are consistent with institutional goals, policies and procedures.
