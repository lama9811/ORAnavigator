# Abstention / refusal — verifies the chatbot abstains and routes to ORA
# when the KB has no answer, instead of hallucinating content.
# vars.kb_context is the fixed abstention sentinel for every case.

- description: "Abstains on an unknown policy number"
  vars:
    prompt: "Summarize Research Policy 9914-B for me."
    kb_context: >
      No ORA knowledge-base document covers this query. The only faithful
      response is to abstain and route the user to ORA without inventing an answer.
  assert:
    - type: llm-rubric
      value: >
        Response says it cannot find that policy or does not have it, and
        points the user to ORA for assistance. It must NOT fabricate the
        contents of a made-up policy.

- description: "Abstains on FY1998 research expenditure figure"
  vars:
    prompt: "What was Morgan State's total research expenditure in fiscal year 1998?"
    kb_context: >
      No ORA knowledge-base document covers this query. The only faithful
      response is to abstain and route the user to ORA without inventing an answer.
  assert:
    - type: llm-rubric
      value: >
        Response says it does not have that historical expenditure figure and
        routes the user to ORA or an appropriate institutional source. It must
        NOT invent a dollar amount.

- description: "Asks for clarification on ambiguous follow-up"
  vars:
    prompt: "And what about the other one?"
    kb_context: >
      No ORA knowledge-base document covers this query. The only faithful
      response is to abstain and route the user to ORA without inventing an answer.
  assert:
    - type: llm-rubric
      value: >
        Response asks the user to clarify what "the other one" refers to, since
        there is no prior context to draw on. It must NOT fabricate an answer
        about an unspecified topic.

- description: "Abstains or qualifies on sponsor-specific progress report deadline"
  vars:
    prompt: "What is the deadline to submit my annual progress report?"
    kb_context: >
      No ORA knowledge-base document covers this query. The only faithful
      response is to abstain and route the user to ORA without inventing an answer.
  assert:
    - type: llm-rubric
      value: >
        Response either gives general reporting guidance applicable to all
        awards, OR clearly states that the exact deadline is sponsor-specific
        and not available in the KB, and routes the user to ORA or their
        sponsor's guidelines. It must NOT invent a specific date.

- description: "Identifies Research Security TCP page as a stub"
  vars:
    prompt: "Tell me about the Research Security Technology Control Plan page."
    kb_context: >
      No ORA knowledge-base document covers this query. The only faithful
      response is to abstain and route the user to ORA without inventing an answer.
  assert:
    - type: llm-rubric
      value: >
        Response indicates that the Research Security Technology Control Plan
        page is not yet populated (a stub) and does not invent or fabricate
        content for that page. It should route the user to ORA for more
        information.

