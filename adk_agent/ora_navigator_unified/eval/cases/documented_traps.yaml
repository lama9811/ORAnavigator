- description: "Research Security TCP page — stub (DocuSign not yet published)"
  vars:
    prompt: "Tell me about the Research Security Technology Control Plan."
    kb_context: >
      No ORA knowledge-base document covers this query. The only faithful
      response is to abstain and route the user to ORA without inventing an answer.
  assert:
    - type: llm-rubric
      value: >
        The response acknowledges that the Technology Control Plan (TCP) DocuSign template or
        submission form is not yet published (the page says "coming soon"). It does NOT invent
        a submission process, form URL, or detailed TCP requirements beyond what ORA has
        published. It routes the user to contact ORA directly (ask.ora@morgan.edu or
        443-885-4044) for current TCP guidance.

