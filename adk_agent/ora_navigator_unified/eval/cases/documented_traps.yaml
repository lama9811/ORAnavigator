# documented_traps.yaml — 14 "documented trap" cases encoding known hallucination risks
# for the ORA Navigator chatbot (Morgan State University).

- description: "IACUC SOP 37 — does not exist (gap in numbering)"
  vars:
    prompt: "What does IACUC SOP 37 cover?"
    kb_context: >
      The Morgan State University IACUC publishes 50+ Standard Operating Procedures (SOPs).
      The numbering is non-contiguous: SOP 36.2 covers Health Checks and Veterinary Clinical
      Calls, and SOP 38.2 covers Water Testing. SOP 37 is currently not published — it does
      not exist in ORA's current SOP set. There is no document describing what "SOP 37" covers.
      Source: backend/kb_structured/research_compliance/animal_research/iacuc_sops/compliance_iacuc_sops.json
  assert:
    - type: llm-rubric
      value: >
        The response indicates that SOP 37 is not published / does not exist in ORA's IACUC
        SOP numbering. It does NOT invent or describe contents for a hypothetical SOP 37.
        It may note that the numbering jumps from SOP 36 to SOP 38.

- description: "IACUC SOP count — 50+ with SOP 37 missing"
  vars:
    prompt: "How many IACUC SOPs are there?"
    kb_context: >
      The Morgan State University IACUC publishes a comprehensive set of 50+ Standard Operating
      Procedures (SOPs). The published count is 50 numbered SOPs (SOP 1.2 through SOP 51.1),
      but the numbering is non-contiguous: SOP 37 is not published, so the highest number is
      51 while the actual published count is 50. The KB document states "50+" SOPs governing
      every aspect of animal care and use at the Animal Research Facility (ARF).
      Source: backend/kb_structured/research_compliance/animal_research/iacuc_sops/compliance_iacuc_sops.json
  assert:
    - type: llm-rubric
      value: >
        The response states that there are 50+ IACUC SOPs, grounded in the ORA knowledge base.
        It may additionally note that SOP 37 is missing from the numbering sequence (gap
        between SOP 36 and SOP 38). It does not state a precise count lower than 50.

- description: "F&A rate — Organized Research on-campus (both fiscal years)"
  vars:
    prompt: "What is Morgan State's F&A rate for organized research?"
    kb_context: >
      Morgan State University's negotiated F&A (Facilities & Administrative / Indirect Cost)
      rates for Organized Research (On-Campus):
      - FY 2024-2025 (07/01/2024 – 06/30/2025): 53%
      - FY 2025-2026 (07/01/2025 – 06/30/2026): 54%
      For questions, contact ORA at ask.ora@morgan.edu or 443-885-4044 (fax 443-885-8280).
      Source: backend/kb_structured/pre_award/fanda_cost_rates/pre_award_fanda_cost_rates.json
  assert:
    - type: contains-any
      value: ["53%", "54%"]

