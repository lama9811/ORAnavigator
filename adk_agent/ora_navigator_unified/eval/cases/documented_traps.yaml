- description: "IACUC SOP 37 existence — explicit yes/no question"
  vars:
    prompt: "Is there an IACUC SOP numbered 37?"
    kb_context: >
      The Morgan State University IACUC SOP list has non-contiguous numbering.
      SOP 36.2 (Health Checks and Veterinary Clinical Calls) is followed immediately by
      SOP 38.2 (Water Testing). SOP 37 is currently not published and does not appear
      in the official IACUC SOP index.
      Source: backend/kb_structured/research_compliance/animal_research/iacuc_sops/compliance_iacuc_sops.json
  assert:
    - type: llm-rubric
      value: >
        The response clearly states that there is no IACUC SOP numbered 37. It does not
        hedge ambiguously or suggest SOP 37 might exist. It may note that the numbering
        jumps from SOP 36 to SOP 38.
