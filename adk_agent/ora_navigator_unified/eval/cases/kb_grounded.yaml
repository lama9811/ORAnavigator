- description: "KB-grounded — Maryland financial disclosure requirement"
  vars:
    prompt: "Do I need to file a Maryland financial disclosure?"
    kb_context: >
      As a state entity, Morgan State University is fully subject to the Maryland Public Ethics Law (General Provisions Article, Title 5, established 1979). Its conflict-of-interest provisions apply to all state employees regardless of grade or years of service. More than 14,000 state employees, elected officials, and designated categories — including agency managers, regulators, and purchasing staff — must file an annual financial disclosure statement identifying real-estate interests, equity interests, employment relationships, debts, and gifts. New filers must complete two hours of ethics training within six months of first becoming required to file.
      Source: backend/kb_structured/research_compliance/state_of_maryland_ethics_and_financial_disclosure/compliance_maryland_ethics_financial_disclosure.json
  assert:
    - type: llm-rubric
      value: >
        Response describes the Maryland financial disclosure requirement using facts
        present in the KB CONTEXT and does not invent filer categories, training hours,
        or disclosure deadlines not present there.
    - type: contains
      value: "two hours"

- description: "KB-grounded — responsible conduct of research training"
  vars:
    prompt: "What training does responsible conduct of research require?"
    kb_context: >
      Morgan State University's RCR program requires researchers receiving support from NIH and/or NSF grants to complete RCR training at the start of their award and again every four years. The curriculum addresses eight major content areas, including falsification and fabrication, conflicts of interest, authorship, and intellectual property. Training is available through (1) the CITI Program online course at citiprogram.org and (2) in-person presentations and topic-specific sessions led by subject-matter experts. ORA also provides an RCR PowerPoint Presentation resource summarizing core RCR concepts.
      Source: backend/kb_structured/research_compliance/responsible_conduct_of_research/compliance_responsible_conduct_of_research.json
  assert:
    - type: llm-rubric
      value: >
        Response describes RCR training requirements at Morgan State using facts
        present in the KB CONTEXT and does not invent training intervals, topic areas,
        or funder requirements not present there.
    - type: contains
      value: "every four years"

- description: "KB-grounded — ORA letter templates"
  vars:
    prompt: "What templates does ORA provide?"
    kb_context: >
      ORA provides five letter templates (each with a blank fillable version and a completed sample): (1) Subaward to MSU Commitment Letter — required when MSU is planning to be a subrecipient; (2) Civil Rights Protections for NIH Grants Letter — required for certain NIH grants (check the FOA); (3) Change of PI Request Letter — required for any PI change along with supporting documentation; (4) No-Cost Extension Letter — ORA must be notified no less than 60 days prior to the award end date (NSF uses Research.gov; NIH uses eRA Commons); (5) Termination of Work Letter — required for stop-work orders to contractors or subawardees.
      Source: backend/kb_structured/resources/templates/resources_templates.json
  assert:
