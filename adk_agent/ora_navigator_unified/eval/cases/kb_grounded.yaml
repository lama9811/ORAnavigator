- description: "KB-grounded — post-award notification and setup"
  vars:
    prompt: "What happens after my grant is awarded?"
    kb_context: >
      Award notifications (award letter, purchase order, detailed contract, or agreement) are directed to the Assistant VP for Research Administration, who distributes copies to the PI/PD and VP for Finance. The Office of Restricted Funds Accounting (RFA) assigns an Index or Budget code number and establishes the account in Banner; account setup typically takes up to three business days. A Post-Award Briefing meeting is then scheduled with the PI, involving ORA, Human Resources, Procurement, the Comptroller's Office, and the Purchasing Card Office. Awards for proposals that did not go through ORA may be refused by the University.
      Source: backend/kb_structured/post_award/notification_and_setup_of_award/post_award_notification_and_setup.json
  assert:
    - type: llm-rubric
      value: >
        Response describes what happens after a grant is awarded at Morgan State using
        facts present in the KB CONTEXT and does not invent turnaround times, office
        names, or procedural steps not present there.
    - type: contains
      value: "three (3) business days"

- description: "KB-grounded — post-award reporting requirements"
  vars:
    prompt: "What reports do I have to file on my grant?"
    kb_context: >
      PIs/PDs prepare technical (programmatic) reports at intervals specified in the Notice of Award (monthly, quarterly, annually, or at closeout). Final reports are normally due within 90 days after the end of the project period and include the technical, property, and invention reports — property and invention reports are required even when the project acquired no equipment and produced no invention. Effort certifications are generated three times per year: February (Fall semester), July (Spring semester), and October (Summer effort), and must be completed within 14 calendar days of release. Reporting is governed by 2 CFR 200 (OMB Uniform Guidance).
      Source: backend/kb_structured/post_award/reporting/post_award_reporting.json
  assert:
    - type: llm-rubric
      value: >
        Response describes post-award reporting requirements using facts present in
        the KB CONTEXT and does not invent report types, deadlines, or regulatory
        citations not present there.
    - type: contains
      value: "90 days"

- description: "KB-grounded — post-award subawards"
  vars:
    prompt: "How do subawards work after the award?"
    kb_context: >
      A subaward is issued to a subrecipient for assistance in carrying out a specified programmatic effort on a sponsored project; Morgan State passes through a portion of the sponsored award to the other entity. Subawards may also be called subgrants, subagreements, or subcontracts. Subrecipients bear responsibility for programmatic and administrative decisions and for compliance with the prime award terms. Subaward monitoring is coordinated by ORA Post-Award staff in collaboration with the PI. A training video "Subawards: What You Need to Know" is available, and detailed procedures are in PI Handbook 3: Grant-Related Processes.
      Source: backend/kb_structured/post_award/post_award_subawards/post_award_subawards.json
  assert:
    - type: llm-rubric
      value: >
        Response describes how post-award subawards work at Morgan State using facts
        present in the KB CONTEXT and does not invent subrecipient monitoring procedures
        or approval thresholds not present there.
    - type: contains
      value: "subrecipient"

- description: "KB-grounded — post-award forms index"
  vars:
    prompt: "What post-award forms does ORA provide?"
    kb_context: >
      The Post-Award Forms page lists eight DocuSign forms: (1) Honoraria Request Memo, (2) PF-10 Contractual Personnel Request Form (for revisions and continuations of existing contractual personnel only), (3) Stipend Request Memo (minimum 45 days advance notice required), (4) Non-Title III Travel Request Form, (5) Title III Travel Request Form, (6) Travel Reimbursement Form (GAD Form X-5), (7) Grant-Funded Undergraduate Tuition, Fees, and Health Insurance Request Memo, and (8) Grant-Funded Graduate Tuition and Fees Request Memo. All submissions route through DocuSign; the primary contact is Rebecca Steiner (rebecca.steiner@morgan.edu).
      Source: backend/kb_structured/post_award/forms/post_award_forms_index.json
  assert:
