- description: "KB-grounded — research security"
  vars:
    prompt: "What is research security?"
    kb_context: >
      Morgan State University's Research Security Program fosters a secure and ethical research environment with focus on federally sponsored research. The program covers four core domains: (1) Cybersecurity — safeguarding sensitive research data, systems, and networks; (2) Export Controls — compliance with U.S. export-control laws governing sharing of sensitive technologies with international partners; (3) Conflict of Interest — identifying, disclosing, and managing potential conflicts in federally funded research; (4) Foreign Travel Security — protecting researchers and their work when traveling abroad. The program is anchored to the federal NSPM-33 framework, which applies to institutions receiving $50 million or more in annual federal research funding.
      Source: backend/kb_structured/research_compliance/research_security/compliance_research_security.json
  assert:
    - type: llm-rubric
      value: >
        Response describes Morgan State's research security program using the four
        core domains and framework references present in the KB CONTEXT and does not
        invent regulatory requirements or program components not present there.
    - type: contains
      value: "NSPM-33"

- description: "KB-grounded — diversity and EEO in research"
  vars:
    prompt: "What does ORA say about diversity and EEO in research?"
    kb_context: >
      Morgan State University aims to maintain an academic and working environment in which students, faculty, and staff feel safe and are free to develop intellectually, professionally, personally, and socially. The university maintains a Nondiscrimination Policy and a Sexual Harassment and Prohibited Conduct Policy. The ORA Diversity and EEO compliance page links to institutional documents including the Annual Cultural Diversity Plan (2022), the Transformation Morgan 2030 Strategic Plan, and the Public Notice of Title VI Program Rights (2024). The university complies with Title VI of the federal civil-rights framework; Title IX information is on its own dedicated page.
      Source: backend/kb_structured/research_compliance/diversity_and_eeo/compliance_diversity_and_eeo.json
  assert:
