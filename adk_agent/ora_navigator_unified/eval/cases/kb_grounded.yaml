- description: "KB-grounded — budget development"
  vars:
    prompt: "How do I develop a grant budget?"
    kb_context: >
      ORA emphasizes that the budget (also called the cost proposal) is equally as important as the technical proposal. Budgets cover direct costs (personnel salaries and wages, fringe benefits, equipment, travel, participant support, materials, consultants, subawards) and indirect costs. Current fringe benefit rates include 42% for regular full-time or faculty during the academic year and 9% for faculty during summer or contractual employees. Equipment is defined as property costing $5,000 or more with a service life exceeding one year. Morgan State's negotiated F&A (indirect cost) rate for Organized Research (On-Campus) is 53–54% of modified total direct cost. Current 2025 Maryland mileage reimbursement is $0.70 per mile.
      Source: backend/kb_structured/pre_award/budget_development/pre_award_budget_development.json
  assert:
    - type: llm-rubric
      value: >
        Response describes how to develop a grant budget using facts present in the
        KB CONTEXT and does not invent fringe rates, F&A rates, equipment thresholds,
        or travel rates not present there.
    - type: contains
      value: "$0.70 per mile"

- description: "KB-grounded — proposal components"
  vars:
    prompt: "What are the components of a grant proposal?"
    kb_context: >
      Standard proposal components at Morgan State University include: Abstract/Executive Summary (concise summary within sponsor-specified space limits covering problem, objectives, approach, and project cost); Introduction/Background (demonstrates knowledge of the field and identifies research gaps); Goals & Objectives (broad long-term goals and clear, measurable specific objectives); Methodology (explains how objectives will be achieved and justifies selected methods); Key Personnel (qualifications, experience, and roles — list the PI first); and Evaluation (for training or demonstration projects, describes data collection and evaluation tied to objectives). Each Funding Opportunity Announcement (FoA) specifies its own requirements.
      Source: backend/kb_structured/pre_award/proposal_components/pre_award_proposal_components.json
  assert:
    - type: llm-rubric
      value: >
        Response describes the components of a grant proposal using sections and
        descriptions present in the KB CONTEXT and does not invent additional required
        sections or sponsor-specific requirements not present there.

- description: "KB-grounded — role of the principal investigator"
  vars:
    prompt: "What is the role of the principal investigator?"
    kb_context: >
      Full-time tenure track faculty members at any academic rank automatically qualify as PI/PD at Morgan State. Other university appointees (directors, senior administrators, visiting faculty, retired faculty) may serve as PI/PD with dean approval and a Memorandum of Designation filed with ORA. Adjunct faculty serving as PI/PD may need a full-time co-PI/PD. Full-time regular staff with appropriate qualifications are also eligible. For individual fellowship applications where a sponsor requires the Fellow to be PI/PD, a Sponsor or Mentor meeting the eligibility criteria will serve as the Project Director on MSU records.
      Source: backend/kb_structured/pre_award/role_of_principal_investigator/pre_award_role_of_principal_investigator.json
  assert:
    - type: llm-rubric
      value: >
        Response describes PI/PD eligibility criteria at Morgan State using facts
        present in the KB CONTEXT and does not invent eligibility rules, approval
        processes, or exceptions not present there.
    - type: contains
      value: "tenure track"

- description: "KB-grounded — proposal submission checklist"
  vars:
    prompt: "What's on the proposal submission checklist?"
    kb_context: >
      ORA recommends creating a timeline and/or table to help complete proposal sections, structuring proposals with outlines, and seeking external review. Completing a successful proposal can take several weeks to several months, so investigators should start early. Two downloadable checklists are available: the Basic Proposal Preparation Checklist (PDF) and the NSF EIR Proposal Preparation Checklist (PDF). Related pre-award pages include Proposal Components, Budget Development, Fringe Benefit Rate, F&A Cost Rates, and Internal Routing Form.
