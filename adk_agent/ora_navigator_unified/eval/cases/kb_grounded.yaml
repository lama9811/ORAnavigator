- description: "KB-grounded — ORA history"
  vars:
    prompt: "What is the history of the Office of Research Administration?"
    kb_context: >
      The Office of Sponsored Programs and Research (OSPR) was established in 1988 under Dr. Edet Isuk as Founding Director with one secretarial assistant; annual extramural funding averaged $7 million at inception. In 1997 Dr. Henry Williams joined as AVP for Sponsored Programs, growing staff to 11 and annual funding to $24 million. In 2020 the office was renamed from OSPR to the Office of Research Administration (ORA) and Dr. Farin Kamangar was appointed AVP. By 2022 new commitments reached $72 million, including GESTAR II ($28M), ASCEND expansion ($17M), RCMI ($15M), and ONR AI/ML research ($9M).
      Source: backend/kb_structured/about/history/ora_history.json
  assert:
    - type: llm-rubric
      value: >
        Response describes the history of ORA using facts present in the KB CONTEXT
        and does not invent leadership names, dates, or funding figures not present there.
    - type: contains
      value: "1988"

- description: "KB-grounded — ORA mission and vision"
  vars:
    prompt: "What is ORA's mission?"
    kb_context: >
      ORA's mission is: "The ORA will provide oversight and high-quality service to MSU researchers and research partners and work closely with the funding agencies." Service will be highly effective, efficient, and respectful, aiming to be highly respected by clients and partners for accuracy of oversight and quality of service. ORA's vision is to propel MSU to the R1 space. Its five strategic goals include enhancing staff and campus knowledge about grants, providing compliance oversight, improving efficiency, improving customer service, and facilitating research funding growth.
      Source: backend/kb_structured/about/mission_and_vision/ora_mission_and_vision.json
  assert:
    - type: llm-rubric
      value: >
        Response accurately describes ORA's mission and/or vision using facts present
        in the KB CONTEXT and does not invent strategic goals or policy statements
        not present there.

- description: "KB-grounded — federal HBCU/MSI funding opportunities"
  vars:
    prompt: "Where can I find federal funding opportunities?"
    kb_context: >
      Morgan State University, as an R2 HBCU, is eligible for and encouraged to pursue HBCU/MSI-targeted federal programs. Agencies with dedicated HBCU/MSI programs include the Department of Defense (DoD Research and Education Program for HBCU/MSI, Army Research Lab, Air Force Research Lab, Office of Naval Research), the Department of Education (Strengthening HBCUs, MSEIP), the Department of Energy (NNSA MSI Partnership Program), NASA (MUREP Small Projects), NIH (NIGMS SuRE, R15, RCMI), and NSF (HBCU-UP, Excellence in Research, CREST, LSAMP, S-STEM).
      Source: backend/kb_structured/funding_sources/federal/opportunity_category_hbcu_msi.json
  assert:
    - type: llm-rubric
      value: >
        Response describes federal funding opportunities for Morgan State using agencies
        and programs present in the KB CONTEXT and does not invent program names or
        agency affiliations not present there.
    - type: contains
      value: "HBCU"

- description: "KB-grounded — private foundation grants"
