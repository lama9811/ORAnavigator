- description: "KB-grounded — NIH/NSF/DOE common forms announcement"
  vars:
    prompt: "What is the NIH/NSF/DOE common forms announcement?"
    kb_context: >
      Beginning January 2026, NIH and DOE require investigators to use SciENcv to generate digitally certified Common Forms, including the Biographical Sketch and Current and Pending Support. Faculty should create and maintain an up-to-date SciENcv profile at https://www.ncbi.nlm.nih.gov/sciencv/. NSF and DOE also require senior/key personnel to complete and certify research security training — the one-hour CITI Research Security Training (Combined) module — prior to proposal submission. Questions go to ask.ora@morgan.edu.
