server {
    listen 8080;
    server_name localhost;

    # Root directory for frontend build
    root /usr/share/nginx/html;
    index index.html;

    # --- Never hard-cache the app shell or the service worker -------------------
    # index.html and sw.js MUST be revalidated on every load. Otherwise a
    # returning PWA visitor keeps a stale shell / service worker that requests
    # yesterday's hashed chunk filenames (e.g. MyProposals-<oldhash>.js), which
    # 404 after a redeploy and break lazy-loaded pages (the "solicitation 404").
    # The previous config cached ALL *.js for 1y/immutable -- that swept up sw.js
    # and pinned the old service worker for a year. Keep these no-cache.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # --- Content-hashed build assets: safe to cache forever ---------------------
    # Everything under /assets/ carries a content hash in its filename, so a new
    # build produces new names; caching these immutably can never go stale.
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Other static files (logo, favicon, workbox runtime): modest cache ------
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|js|css)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # --- SPA routing ------------------------------------------------------------
    # Unknown paths fall back to index.html (which re-matches the no-cache rule
    # above via the internal redirect).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
